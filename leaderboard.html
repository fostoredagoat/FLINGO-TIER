<!-- POPUP OVERLAY -->
<div class="overlay" id="popup-overlay"></div>

<div class="overlay" id="login-overlay">
  <div class="modal-card" style="max-width:340px">
    <div style="padding:1.6rem 1.5rem">
      <div class="modal-title">Admin Login</div>
      <div class="login-err" id="login-err">Invalid credentials</div>
      <div class="fg"><label class="fl">Username</label><input class="fi" id="l-u" type="text" autocomplete="off"/></div>
      <div class="fg" style="margin-top:.6rem"><label class="fl">Password</label><input class="fi" id="l-p" type="password" autocomplete="off"/></div>
      <button class="btn btn-primary w100" id="l-btn">Login</button>
    </div>
  </div>
</div>

<!-- EDIT OVERLAY -->
<div class="overlay" id="edit-overlay">
  <div class="modal-card wide" id="edit-card"></div>
</div>

<main>
  <section class="lb-section">

    <div class="lb-header">
      <div>
        <div class="lb-eye"><img src="over_all.png" class="lb-eye-icon" alt="trophy"/> Rankings</div>
        <h1 class="lb-title">Leaderboard</h1>
      </div>
      <div class="lb-right">
        <span class="count-pill" id="count-badge">0 Players</span>
        <a href="https://discord.gg/s5JeqjDR" class="btn btn-ghost btn-sm" target="_blank" rel="noopener">Discord</a>
      </div>
    </div>

    <div class="tabs-wrap" id="tabs"></div>

    <div class="controls">
      <div class="search-wrap">
        <i class="s-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg></i>

      </div>
    </div>

    <div class="leaderboard" id="leaderboard"></div>

    <!-- Admin add-player form — shown only when body.admin-mode -->
    <div id="admin-section"></div>

  </section>
